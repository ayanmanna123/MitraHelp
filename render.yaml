services:
  - type: web
    name: mitrahelp-backend
    env: node
    plan: starter # Starter is recommended due to TensorFlow memory usage
    rootDir: backend
    buildCommand: ./render-build.sh
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: PYTHON_VERSION
        value: 3.11.10
      - fromGroup: mitrahelp-secrets # You can create a secret group in Render dashboard
